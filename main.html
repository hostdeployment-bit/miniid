<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>POPKIDMD</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>

  <!-- iPhone-like Font -->
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;

      /* iPhone gradient background */
      background: linear-gradient(135deg, #1c1c1e, #2c2c2e, #3a3a3c);
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
    }

    .box {
      width: 320px;
      padding: 25px;
      border-radius: 25px;

      /* Glass Effect */
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.2);

      text-align: center;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
    }

    h3 {
      color: white;
      font-weight: 700;
      letter-spacing: 1px;
      margin: 10px 0;
    }

    h6 {
      color: #d1d1d6;
      font-weight: 400;
      margin: 8px 0;
    }

    .input-container {
      display: flex;
      width: 100%;
      margin-top: 20px;
    }

    .input-container input,
    .input-container button {
      height: 3rem;
      font-size: 1rem;
      border: none;
      outline: none;
      box-sizing: border-box;
    }

    .input-container input {
      width: 70%;
      border-radius: 15px 0 0 15px;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      padding-left: 1rem;
      backdrop-filter: blur(10px);
    }

    .input-container input::placeholder {
      color: #c7c7cc;
    }

    .input-container button {
      width: 30%;
      border-radius: 0 15px 15px 0;
      background: rgba(0, 122, 255, 0.8);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .input-container button:hover {
      background: rgba(0, 122, 255, 1);
    }

    a.centered-text {
      color: #d1d1d6;
      display: block;
      margin-top: 20px;
      font-weight: 500;
    }

    /* Soft floating background bubbles */
    .neon-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 1;
    }

    .dot {
      position: absolute;
      width: 8px;
      height: 8px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      animation: rise 10s linear infinite;
    }

    @keyframes rise {
      0% {
        transform: translateY(100vh) scale(0.6);
        opacity: 0.2;
      }
      100% {
        transform: translateY(-10vh) scale(1);
        opacity: 0.8;
      }
    }
  </style>
</head>
<body>
  <div class="neon-bg" id="dots"></div>

  <div class="container">
    <div class="box" id="box">
      <div id="text">
        <i class="fa fa-user" style="color:#0a84ff;"></i>
        <h3>POPKID-𝐌𝐃 𝐅𝐑𝐄𝐄 𝐁𝐎𝐓</h3>
        <h6>𝙲𝚁𝙴𝙰𝚃𝙴 𝙱𝚈 POPKID</h6>
        <h6>🔢 Enter your number with country code</h6>

        <div class="input-container">
          <input placeholder="254xxxxxxx" type="number" id="number">
          <button id="submit">Submit</button>
        </div>

        <a id="waiting-message" class="centered-text" style="display: none;">Please wait a while...</a>
        <main id="pair"></main>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    let a = document.getElementById("pair");
    let b = document.getElementById("submit");
    let c = document.getElementById("number");

    async function Copy() {
      let text = document.getElementById("copy").innerText;
      let obj = document.getElementById("copy");
      await navigator.clipboard.writeText(obj.innerText.replace('CODE: ', ''));
      obj.innerText = "COPIED";
      obj.style = "color:#0a84ff;font-weight:bold";
      obj.size = "5";
      setTimeout(() => {
        obj.innerText = text;
        obj.style = "color:white;font-weight:bold";
        obj.size = "5";
      }, 500);
    }

    b.addEventListener("click", async (e) => {
      e.preventDefault();
      if (!c.value) {
        a.innerHTML = '<a style="color:white;font-weight:bold">Enter your WhatsApp number with Country Code</a><br><br>';
      } else if (c.value.replace(/[^0-9]/g, "").length < 11) {
        a.innerHTML = '<a style="color:red;font-weight:bold">Invalid Number</a><br><br>';
      } else {
        const number = c.value.replace(/[^0-9]/g, "");
        c.type = "text";
        c.value = "+" + number;
        c.style = "color:white;font-size:20px";
        a.innerHTML = '<a style="color:white;font-weight:bold">Please Wait...</a><br><br>';
        let { data } = await axios(`/code?number=${number}`);
        let code = data.code || "Service Unavailable";
        a.innerHTML = `<font id="copy" onclick="Copy()" style="color:#ff453a;font-weight:bold" size="5">CODE: <span style="color:white;">${code}</span></font><br><br><br>`;
      }
    });

    const bg = document.getElementById("dots");
    for (let i = 0; i < 80; i++) {
      const dot = document.createElement("div");
      dot.classList.add("dot");
      dot.style.left = Math.random() * 100 + "vw";
      dot.style.animationDuration = 5 + Math.random() * 6 + "s";
      dot.style.animationDelay = Math.random() * 5 + "s";
      bg.appendChild(dot);
    }
  </script>
</body>
</html>
